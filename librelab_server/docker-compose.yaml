services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: librelab
      POSTGRES_DB: librelab
      POSTGRES_PASSWORD: "oHhK1voPC92Yrg5ZAEfQhd1q2yEyzdtW"
    volumes:
      - librelab_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "A2PteFV0goeljxNgp4PY1byNDMXRciQi"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: librelab_test
      POSTGRES_PASSWORD: "XyEz-wvkhPlYQfrowm5lAv7L0yUufzxM"
    volumes:
      - librelab_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "22ligeGL4-tnv0CTQwd8HzY7y976yDR2"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  librelab_data:
  librelab_test_data:
