name: librelab_server
description: Starting point for a Serverpod server.
version: 0.0.1+1
publish_to: 'none'

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  meta: ^1.17.0
  serverpod: ^3.5.0-beta.9
  serverpod_auth_idp_server: ^3.5.0-beta.9
  librelab_shared: ^1.0.0
  mdns_dart: ^2.2.1
  path: ^1.9.1
  yaml_edit: ^2.2.4
  yaml: ^3.1.3
  win32_registry_value_reader: ^1.0.0
  collection: ^1.19.1

dev_dependencies:
  lints: '>=3.0.0 <7.0.0'
  serverpod_test: ^3.5.0-beta.9
  test: ^1.25.5

# (LATER) TODO: https://github.com/serverpod/serverpod/issues/5224
dependency_overrides:
  win32: ^6.3.0

serverpod:
  scripts:
    # Starts the server and applies migrations
    start: dart bin/main.dart --apply-migrations

    # Build the Flutter web app and copy it to the server's web directory.
    # Windows uses xcopy since flutter's --output flag doesn't work there.
    # See: https://github.com/flutter/flutter/issues/157886
    flutter_build:
      windows: >-
        (if exist web\app rmdir /S /Q web\app)
        & cd /D ..\librelab_flutter
        && flutter build web --base-href /app/ --wasm
        && xcopy /E /I /Y build\web ..\librelab_server\web\app
      posix: |
        cd ../librelab_flutter
        flutter build web --base-href /app/ --wasm --output ../librelab_server/web/app
