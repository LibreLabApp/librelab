name: mdns_discovery_bonsoir
description: Implementation of mdns_discovery that uses bonsoir Flutter plugin (platform-specific APIs)
version: 1.0.0
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.11.5

dependencies:
  mdns_discovery: ^1.0.0
  bonsoir: ^6.1.0
  logging: ^1.3.0

# (LATER) TODO: (MDNS) Remove once https://github.com/Skyost/Bonsoir/pull/135 is merged
dependency_overrides:
  bonsoir:
    git:
      url: https://github.com/Skyost/Bonsoir.git
      ref: 3f4cf230c1b477757c56dc667620289c43f9e3fb
      path: packages/bonsoir
  bonsoir_android:
    git:
      url: https://github.com/Skyost/Bonsoir.git
      ref: 3f4cf230c1b477757c56dc667620289c43f9e3fb
      path: packages/bonsoir_android
  bonsoir_windows:
    git:
      url: https://github.com/Skyost/Bonsoir.git
      ref: 3f4cf230c1b477757c56dc667620289c43f9e3fb
      path: packages/bonsoir_windows
  bonsoir_darwin:
    git:
      url: https://github.com/Skyost/Bonsoir.git
      ref: 3f4cf230c1b477757c56dc667620289c43f9e3fb
      path: packages/bonsoir_darwin
  bonsoir_linux:
    git:
      url: https://github.com/Skyost/Bonsoir.git
      ref: 3f4cf230c1b477757c56dc667620289c43f9e3fb
