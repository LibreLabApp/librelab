name: librelab_api_contract
description: |
  Shared type-safe client-server API contract that describes HTTP methods,
  endpoints, query parameters, headers, and response/request body schemas
  for LibreLab
version: 0.0.1
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.13.0-167.1.beta

dependencies:
  json_annotation: ^4.12.0
  meta: ^1.18.0
  json_safe: ^0.0.2
  http_method_enum: ^0.0.2
  collection: ^1.19.1

dev_dependencies:
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  code_builder: ^4.11.1
  dart_style: ^3.1.7
  path: ^1.9.1
