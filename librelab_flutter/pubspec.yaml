# Run "dart scripts/generate_pubspec_dart_code.dart" when updating any of these values.
name: librelab_flutter
description: "A new Flutter project."
publish_to: 'none'
version: 0.0.1+1
resolution: workspace

environment:
  sdk: ^3.13.0-167.1.beta

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  librelab_api_contract: ^0.0.1
  librelab_api_client: ^0.0.1
  librelab_shared: ^1.0.0
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  go_router: ^17.2.2
  flutter_window_close: ^1.3.0
  # Provider is used mainly for dependency injection.
  provider: ^6.1.5+1
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  meta: ^1.17.0
  collection: ^1.19.1
  logging: ^1.3.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  string_storage: ^0.0.1
  string_storage_shared_preferences: ^0.0.1
  json_storage: ^0.0.1
  json_safe: ^0.0.2
  system_accent_color: ^0.0.2
  mdns_discovery: ^1.0.0
  mdns_discovery_bonsoir: ^1.0.0
  mdns_discovery_raw: ^1.0.0
  mdns_platform_check: ^1.0.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.6
  connectivity_plus_linux_portal: ^0.0.3
  http: ^1.6.0
  path: ^1.9.1
  cupertino_http: ^3.0.2
  win_http: ^0.2.1
  ok_http: ^0.1.0
  api_client:
    git:
      url: https://github.com/EchoEllet/dart-packages.git
      ref: c32c3eee45e7037641b32d609d4c5a29b0fa7e73
      path: packages/api_client
  stepper_flow: ^0.0.1
  flex_color_picker: ^3.8.0
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.30.0
  build_runner: ^2.14.1
  flutter_gen_runner: ^5.14.1
  freezed: ^4.0.0-dev.3
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  # https://github.com/dart-lang/http/pull/1943
  ok_http:
    git:
      url: https://github.com/EchoEllet/http.git
      ref: chore/update-jni
      path: pkgs/ok_http

flutter:
  uses-material-design: true
  # To support "flutter gen-l10n" for the app package.
  generate: true

  assets:
    # Exclude Lottie assets from web builds (not used on web)
    - path: assets/lottie/
      platforms:
        - android
        - ios
        - macos
        - linux
        - windows

flutter_gen:
  output: lib/generated/

  # Prefers to import "package:lottie" and use Lottie.asset() explicitly
  integrations:
    image: false
    lottie: false

flutter_launcher_icons:
  windows:
    generate: true
    image_path: assets/branding/icon.png
  macos:
    generate: true
    image_path: assets/branding/icon_framed.png
  # Linux: the launcher icon is handled using the packaging solutions (e.g., Flatpak)
  # or using a `.desktop` file.
